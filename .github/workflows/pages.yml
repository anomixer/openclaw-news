name: Deploy MkDocs Site
on:
  push:
    branches:
      - main
      - murmur-runner
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Prepare build directory
        run: |
          mkdir build_docs
          mkdir -p build_docs/docs
          
          # 將 murmur 作為首頁
          cp murmur.md build_docs/index.md
          cp murmur-en.md build_docs/murmur-en.md
          cp README.md build_docs/README.md
          cp README-EN.md build_docs/README-EN.md
          mkdir -p build_docs/pic
          cp -r pic/* build_docs/pic/ || true
          
          # 複製 docs 資料夾以保留相對路徑連結
          cp -r docs/* build_docs/docs/ || true
          
          # 移除暫存檔
          rm -rf build_docs/docs/agents-radar-temp || true

      - name: Build with MkDocs
        run: |
          cp code/mkdocs.yml mkdocs.yml
          mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
