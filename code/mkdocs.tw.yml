site_name: 🦞 OpenClaw 宇宙戰地日誌 (含 🦙 Ollama 安裝指南)
site_description: The chaotic, cynical, and utterly biased war log of the OpenClaw universe.
site_url: ""

repo_url: https://github.com/anomixer/openclaw-news
repo_name: anomixer/openclaw-news

theme:
  name: material
  logo: pic/clawbrian-explosion.png
  favicon: pic/clawbrian-explosion.png
  features:
    - navigation.tabs
    - toc.integrate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  alternate:
    - name: English
      link: /openclaw-news/
      lang: en
    - name: 繁體中文
      link: /openclaw-news/tw/
      lang: zh

nav:
  - 🦞 戰況日誌: index.md
  - 👉 Windows 基礎安裝指南: docs/setup.md
  - 🚀 WSL2 完整教學: docs/wsl2-guide.md
  - 🤔 為什麼需要 WSL2: docs/why-wsl2.md
  - 🔄 遷移指南: docs/migration-guide.md
  - 🧠 模型選用指南: docs/what-model.md

docs_dir: build_docs_zh
site_dir: site/tw

extra_css:
  - custom.css

