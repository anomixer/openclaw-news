site_name: 🦞 OpenClaw Battlefield Log (with 🦙 Ollama Setup)
site_description: The chaotic, cynical, and utterly biased war log of the OpenClaw universe.
site_url: ""

repo_url: https://github.com/anomixer/openclaw-news
repo_name: anomixer/openclaw-news

theme:
  name: material
  logo: pic/clawbrian-explosion.png
  favicon: pic/clawbrian-explosion.png
  features:
    - navigation.tabs
    - toc.integrate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  alternate:
    - name: English
      link: /openclaw-news/
      lang: en
    - name: 繁體中文
      link: /openclaw-news/tw/
      lang: zh

nav:
  - 🦞 Battlefield News Log: index.md
  - 👉 Basic Windows Setup Guide: docs/setup.md
  - 🚀 Full WSL2 Setup Guide: docs/wsl2-guide.md
  - 🤔 Why WSL2: docs/why-wsl2.md
  - 🔄 Migration Guide: docs/migration-guide.md
  - 🧠 Model Selection: docs/what-model.md

docs_dir: build_docs_en
site_dir: site

extra_css:
  - custom.css
